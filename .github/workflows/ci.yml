name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: Vite build + tsc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install and build vite-overlay
        run: cd examples/vite-overlay && npm ci && npm run build
